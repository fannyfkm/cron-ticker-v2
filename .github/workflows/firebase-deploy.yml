name: Deploy Firebase

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🔧 Install Firebase CLI
        run: npm install -g firebase-tools

      - name: 🔑 Write service account
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_TICKER_FANNY }}' > key.json

      - name: 🚀 Deploy
        run: firebase deploy --only hosting --non-interactive --project ticker-fanny
        env:
          GOOGLE_APPLICATION_CREDENTIALS: key.json

      - name: 🧹 Cleanup
        run: rm -f key.json