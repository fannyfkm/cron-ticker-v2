name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    
env: #globales
  NODE_VERSION: "22.21.1"

jobs:
  # JOB_3 BUILD
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{env.NODE_VERSION}}
          cache: 'npm'
      - run: npm ci
      - name: Build App
        run: npm run build
        env: 
          APP_VERSION: ${{vars.APP_VERSION || '1.0.0'}}
      - name: Upload build artifact
        uses: action/upload-artifact@v4
        with:
          name: build-${{github.sha}}
          path: dist/
          retention-days: 5